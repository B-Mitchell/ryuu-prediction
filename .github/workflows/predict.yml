name: Football Predictions

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allows you to run this manually from the GitHub Actions tab

jobs:
  predict:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit sent_fixtures.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run predictor
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python predictor.py

      - name: Save duplicate-prevention state
        # Commits sent_fixtures.json back to the repo so the next run
        # knows which fixtures were already sent. [skip ci] prevents
        # this commit from triggering another workflow run.
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sent_fixtures.json
          git diff --staged --quiet || git commit -m "chore: update sent fixtures [skip ci]"
          git push
